<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selamat Ulang Tahun Sayang 🎂</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --rose:    #e8476a;
  --rose-lt: #fde8ee;
  --gold:    #e8a23a;
  --cream:   #fdf6ef;
  --ink:     #2a1a22;
  --muted:   #8a6878;
  --white:   #fff;
  --shadow:  0 8px 32px rgba(232,71,106,0.12);
}

html, body {
  min-height: 100vh;
  font-family: 'DM Sans', sans-serif;
  background: var(--cream);
  color: var(--ink);
  overflow-x: hidden;
}

/* CONFETTI */
#confetti-layer { position: fixed; inset: 0; pointer-events: none; z-index: 10; overflow: hidden; }
.c-piece { position: absolute; top: -20px; border-radius: 2px; animation: fall linear infinite; opacity: 0; }
@keyframes fall {
  0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(110vh) rotate(800deg); opacity: 0; }
}

/* SCREENS */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }

/* ===== INTRO ===== */
#intro {
  flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 2rem; position: relative;
  background: radial-gradient(ellipse 60% 40% at 20% 20%, rgba(232,71,106,0.07) 0%, transparent 70%), var(--cream);
}
.cake-anim { font-size: 5.5rem; animation: cake-float 3s ease-in-out infinite; margin-bottom: 1.5rem; display: inline-block; }
@keyframes cake-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-14px); } }
.hbd-line { font-family: 'Playfair Display', serif; font-size: clamp(1.9rem, 5vw, 3.2rem); font-weight: 600; color: var(--rose); line-height: 1.2; }
.cta-btn { padding: 0.85rem 2.4rem; border-radius: 50px; background: var(--rose); color: #fff; font-size: 1rem; font-weight: 500; border: none; cursor: pointer; box-shadow: 0 6px 24px rgba(232,71,106,0.3); transition: 0.15s; margin-top: 1.5rem; }

/* ===== GALLERY ===== */
#gallery { flex-direction: column; padding: 2rem 1.5rem; max-width: 760px; margin: 0 auto; width: 100%; }
.gallery-header { text-align: center; margin-bottom: 2rem; }
.gallery-header h1 { font-family: 'Playfair Display', serif; font-size: 1.6rem; color: var(--rose); }

/* MOMENTS GRID */
.moments-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 16px; margin-bottom: 2rem; }
.m-card {
  background: var(--white);
  border-radius: 18px;
  overflow: hidden;
  cursor: pointer;
  box-shadow: 0 2px 12px rgba(42,26,34,0.07);
  transition: transform 0.18s;
  display: flex;
  flex-direction: column;
}
.m-card:hover { transform: translateY(-5px); }

/* PHOTO AREA */
.m-photo-wrap {
  width: 100%;
  aspect-ratio: 4/3;
  background: var(--rose-lt);
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}
.m-photo-wrap img { width: 100%; height: 100%; object-fit: cover; }
.m-card-body { padding: 0.75rem 0.9rem; text-align: center; }
.m-card-label { font-size: 0.85rem; font-weight: 500; color: var(--ink); }

/* DETAIL PANEL */
#detail {
  display: none;
  background: var(--white);
  border-radius: 22px;
  overflow: hidden;
  box-shadow: var(--shadow);
  margin-bottom: 2rem;
  animation: rise 0.4s ease both;
}
#detail.show { display: block; }
@keyframes rise { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.detail-photo-wrap {
  width: 100%;
  height: 350px; /* Tentukan tinggi kotak foto */
  overflow: hidden;
  background: var(--rose-lt);
  display: flex;
  align-items: center;
  justify-content: center;
}

#d-img {
  max-width: 100%;
  max-height: 100%;
  object-fit: contain; /* Foto utuh dan di tengah */
  display: block;
}

.detail-body { padding: 1.4rem 1.5rem; }
.detail-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; color: var(--rose); margin-bottom: 0.5rem; }
.detail-desc { font-size: 0.95rem; color: var(--ink); line-height: 1.7; margin-bottom: 1rem; }
.detail-close { background: var(--rose-lt); border: none; color: var(--rose); padding: 0.5rem 1.2rem; border-radius: 50px; cursor: pointer; }
</style>
</head>
<body>

<div id="confetti-layer"></div>

<div id="intro" class="screen active">
  <div class="cake-anim">🎂</div>
  <div class="hbd-line">Selamat Ulang Tahun, Sayanggg</div>
  <button class="cta-btn" onclick="showGallery()">Klik ini sengg ❤️</button>
</div>

<div id="gallery" class="screen">
  <div class="gallery-header">
    <h1>Foto Favorit Kita 📸</h1>
    <p>Klik kartu untuk melihat kenangan kita</p>
  </div>

  <div id="detail">
    <div class="detail-photo-wrap">
      <img id="d-img" src="">
    </div>
    <div class="detail-body">
      <h3 id="d-title" class="detail-title"></h3>
      <p id="d-desc" class="detail-desc"></p>
      <button class="detail-close" onclick="closeDetail()">✕ Tutup</button>
    </div>
  </div>

  <div class="moments-grid" id="grid"></div>
  <div class="footer-heart">Lop banyakbanyak ♥</div>
</div>

<script>
const MOMENTS = [
  {
    label: "Foto pertama",
    title: "Ni foto yang pertama naa",
    desc: "Ozan kalau liat foto ni kek apaa yak ko ada yaa manusia secakep kamu bisa ma ozan hehehe",
    image: "foto1.jpeg"
  },
  {
    label: "Makan bareng favorit",
    title: "Makan bareng yang nggak terlupakan",
    desc: "Entah kenapa makanan apapun selalu lebih enak kalau dinikmati bareng kamu. 😋",
    image: "foto2.jpeg"
  }
  // Tambahkan momen lain di sini...
];

function renderCards() {
  const grid = document.getElementById('grid');
  grid.innerHTML = '';
  MOMENTS.forEach((m, i) => {
    const card = document.createElement('div');
    card.className = 'm-card';
    card.innerHTML = `
      <div class="m-photo-wrap">
        <img src="${m.image}" alt="${m.label}">
      </div>
      <div class="m-card-body">
        <div class="m-card-label">${m.label}</div>
      </div>
    `;
    card.onclick = () => openDetail(i);
    grid.appendChild(card);
  });
}

function openDetail(i) {
  const m = MOMENTS[i];
  const detail = document.getElementById('detail');
  document.getElementById('d-img').src = m.image;
  document.getElementById('d-title').textContent = m.title;
  document.getElementById('d-desc').textContent = m.desc;
  detail.classList.add('show');
  detail.scrollIntoView({ behavior: 'smooth' });
}

function closeDetail() {
  document.getElementById('detail').classList.remove('show');
}

function showGallery() {
  document.getElementById('intro').classList.remove('active');
  document.getElementById('gallery').classList.add('active');
  renderCards();
}

// Confetti
const colors = ['#e8476a','#f9a8d4','#e8a23a','#fcd34d'];
const layer = document.getElementById('confetti-layer');
for (let i = 0; i < 40; i++) {
  const el = document.createElement('div');
  el.className = 'c-piece';
  el.style.left = Math.random() * 100 + '%';
  el.style.width = el.style.height = (Math.random() * 8 + 6) + 'px';
  el.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
  el.style.animationDuration = (Math.random() * 3 + 2) + 's';
  el.style.animationDelay = Math.random() * 2 + 's';
  layer.appendChild(el);
}
</script>
</body>
</html>
